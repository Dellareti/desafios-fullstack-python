name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # Job 1: Lint + Type Check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: python -m ruff check app/ tests/

      - name: Black (format check)
        run: python -m black --check app/ tests/

      - name: Mypy (type check)
        run: python -m mypy app/

  # Job 2: Testes Unitários
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short --no-cov

  # Job 3: Testes de Integração (Playwright)
  integration-tests:
    name: Integration Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright system dependencies
        run: python -m playwright install-deps chromium

      - name: Install Chromium
        run: python -m playwright install chromium

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v \
            --tb=short \
            --timeout=60 \
            --no-cov \
            -m integration
        env:
          HEADLESS: "true"
          TIMEOUT_MS: "30000"
          LOG_LEVEL: "DEBUG"
        continue-on-error: true  # Portal pode estar indisponível

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: screenshots/
          if-no-files-found: ignore

  # Job 4: Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: rpa-transparencia:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
